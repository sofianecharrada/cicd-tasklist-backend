sonar.host.url=http://localhost:9000
sonar.projectKey=tasklist-backend
sonar.projectName=TaskList - Backend
sonar.projectVersion=1.0.0

# Chemins des sources et des tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/__tests__/**/*.test.ts

# Exclusions de l'analyse et de la couverture
sonar.exclusions=src/__tests__/**, node_modules/**, dist/**, prisma/**
sonar.coverage.exclusions=src/__tests__/**, src/server.ts, **/*.config.ts

# Rapports de tests et de couverture (Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=reports/junit.xml